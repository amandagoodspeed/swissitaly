<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Switzerland & Italy">
  <title>Protected · Switzerland &amp; Italy Itinerary</title>
  <style>
    :root {
      --paper:#fbf6ef;
      --card:#ffffff;
      --ink:#23303a;
      --muted:#7a766f;
      --terra:#bd6a4f;
      --terra-deep:#9c5037;
      --line:#e7ddd0;
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
      background:var(--paper);
      color:var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-image:radial-gradient(circle at 1px 1px, rgba(0,0,0,0.035) 1px, transparent 0);
      background-size:22px 22px;
    }
    .card {
      width:min(100%, 440px);
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      padding:28px;
      box-shadow:0 18px 45px -28px rgba(60,40,20,.5);
    }
    .badge {
      display:inline-block;
      font-size:.7rem;
      font-weight:800;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:var(--terra-deep);
      margin-bottom:8px;
    }
    h1 {
      margin:0 0 8px;
      font-size:clamp(2rem, 8vw, 3rem);
      line-height:.98;
      letter-spacing:-.04em;
    }
    p { margin:0 0 20px; color:var(--muted); line-height:1.45; }
    label { display:block; font-size:.82rem; font-weight:700; margin-bottom:8px; }
    input {
      width:100%;
      font-size:1rem;
      border:1px solid var(--line);
      border-radius:12px;
      padding:13px 14px;
      outline:none;
    }
    input:focus { border-color:var(--terra); box-shadow:0 0 0 3px rgba(189,106,79,.16); }
    button {
      width:100%;
      margin-top:14px;
      border:0;
      border-radius:999px;
      padding:13px 18px;
      background:linear-gradient(135deg, var(--terra) 0%, var(--terra-deep) 100%);
      color:white;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
      cursor:pointer;
    }
    button:disabled { opacity:.6; cursor:wait; }
    .error { min-height:1.3em; margin-top:14px; color:#9c5037; font-size:.9rem; font-weight:700; }
    .fineprint { margin-top:18px; font-size:.78rem; color:var(--muted); }
  </style>
</head>
<body>
  <main class="card">
    <span class="badge">Password Protected</span>
    <h1>Switzerland &amp; Italy</h1>
    <p>Enter the trip password to open the itinerary.</p>
    <form id="unlockForm" autocomplete="off">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" autofocus>
      <button id="unlockButton" type="submit">Unlock itinerary</button>
      <div id="message" class="error" role="alert" aria-live="polite"></div>
    </form>
    <div class="fineprint">This file is encrypted in the browser. The password is not stored in the page.</div>
  </main>

    function b64ToBytes(b64) {
      const bin = atob(b64);
      const out = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
      return out;
    }

    async function deriveKey(password, salt) {
      const enc = new TextEncoder();
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt, iterations: ENCRYPTED_PAGE.iter, hash: ENCRYPTED_PAGE.hash },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    async function unlock(password) {
      if (!window.crypto || !crypto.subtle) {
        throw new Error("This browser needs HTTPS/GitHub Pages for secure decryption. Open it from GitHub Pages, not a plain file preview.");
      }
      const salt = b64ToBytes(ENCRYPTED_PAGE.salt);
      const iv = b64ToBytes(ENCRYPTED_PAGE.iv);
      const data = b64ToBytes(ENCRYPTED_PAGE.data);
      const key = await deriveKey(password, salt);
      const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, data);
      return new TextDecoder().decode(decrypted);
    }

    const form = document.getElementById("unlockForm");
    const message = document.getElementById("message");
    const button = document.getElementById("unlockButton");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      message.textContent = "";
      button.disabled = true;
      button.textContent = "Unlocking...";
      const password = document.getElementById("password").value;
      try {
        const html = await unlock(password);
        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        message.textContent = "Wrong password, or this browser cannot decrypt the page.";
        button.disabled = false;
        button.textContent = "Unlock itinerary";
      }
    });
  </script>
