<style>
  :root {
    --paper:#fbf6ef;
    --ink:#23303a;
    --muted:#7a766f;
    --terra:#bd6a4f;
    --terra-deep:#9c5037;
    --navy:#2b3a4a;
    --line:#e7ddd0;
  }
  * { box-sizing:border-box; }
  html { -webkit-text-size-adjust:100%; }
  body {
    min-height:100vh;
    margin:0;
    display:grid;
    place-items:center;
    padding:24px;
    background:var(--paper);
    color:var(--ink);
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background-image:radial-gradient(circle at 1px 1px, rgba(0,0,0,0.03) 1px, transparent 0);
    background-size:22px 22px;
  }
  .card {
    width:min(100%, 460px);
    background:#fff;
    border:1px solid var(--line);
    border-radius:18px;
    box-shadow:0 18px 50px -28px rgba(60,40,20,.55);
    overflow:hidden;
  }
  .hero {
    padding:28px 28px 20px;
    color:#fdf2ea;
    background:linear-gradient(135deg, var(--terra) 0%, var(--terra-deep) 100%);
  }
  .kicker {
    margin:0 0 8px;
    font-size:.72rem;
    font-weight:800;
    letter-spacing:.22em;
    text-transform:uppercase;
    opacity:.86;
  }
  h1 {
    margin:0;
    font-size:clamp(2rem, 9vw, 3.25rem);
    line-height:.98;
    letter-spacing:-.04em;
  }
  .body { padding:24px 28px 28px; }
  label.main {
    display:block;
    margin:0 0 8px;
    font-size:.75rem;
    font-weight:800;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--navy);
  }
  .password-row { display:flex; gap:10px; }
  input[type="password"], input[type="text"] {
    min-width:0;
    flex:1;
    font:inherit;
    font-size:1rem;
    padding:13px 14px;
    border:1px solid var(--line);
    border-radius:12px;
    color:var(--ink);
    background:#fffdfb;
    outline:none;
  }
  input[type="password"]:focus, input[type="text"]:focus {
    border-color:var(--terra);
    box-shadow:0 0 0 3px rgba(189,106,79,.15);
  }
  button {
    border:0;
    border-radius:999px;
    padding:0 18px;
    font:inherit;
    font-size:.78rem;
    font-weight:800;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:#fff;
    background:var(--navy);
    cursor:pointer;
  }
  button:hover { background:#1d2935; }
  .remember {
    display:flex;
    align-items:flex-start;
    gap:10px;
    margin:15px 0 0;
    color:var(--ink);
    font-size:.94rem;
    line-height:1.35;
  }
  .remember input { margin-top:2px; }
  .hint { margin:14px 0 0; color:var(--muted); font-size:.88rem; line-height:1.45; }
  .status { margin:14px 0 0; font-size:.92rem; min-height:1.3em; }
  .status.error { color:#9c2f2f; }
  .status.ok { color:#4b735c; }
  .small-actions { display:flex; gap:12px; align-items:center; margin-top:14px; }
  .link-button {
    border:0;
    background:transparent;
    color:var(--terra-deep);
    padding:0;
    border-radius:0;
    font-size:.86rem;
    font-weight:700;
    letter-spacing:0;
    text-transform:none;
    text-decoration:underline;
  }
  .link-button:hover { background:transparent; color:#7e3f2b; }
  noscript { display:block; max-width:460px; padding:20px; background:#fff; border:1px solid var(--line); border-radius:12px; }
</style>
</head>

        <button id="unlock-button" type="submit">Unlock</button>
      </div>
      <label class="remember">
        <input id="remember" type="checkbox">
        <span>Remember this password on this device so this page can unlock automatically next time.</span>
      </label>
      <p class="hint">Only use this on a private device. If you check this box, the password is saved in this browser's local storage.</p>
      <div id="status" class="status"></div>
      <div class="small-actions" id="saved-actions" hidden>
        <button type="button" class="link-button" id="forget-button">Forget saved password</button>

    </form>
  </div>
</div>

  };

  const STORAGE_KEY = 'switzerland-italy-itinerary:saved-password:v1';
  const form = document.getElementById('unlock-form');
  const passwordInput = document.getElementById('password');
  const rememberInput = document.getElementById('remember');
  const statusEl = document.getElementById('status');
  const unlockButton = document.getElementById('unlock-button');
  const savedActions = document.getElementById('saved-actions');
  const forgetButton = document.getElementById('forget-button');

  function setStatus(message, type = '') {
    statusEl.textContent = message;
    statusEl.className = 'status' + (type ? ' ' + type : '');
  }

  function base64ToBytes(base64) {
    const binary = atob(base64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return bytes;
  }

  async function deriveKey(password) {
    const encodedPassword = new TextEncoder().encode(password);
    const baseKey = await crypto.subtle.importKey('raw', encodedPassword, 'PBKDF2', false, ['deriveKey']);
    return crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt: base64ToBytes(ENCRYPTED_PAYLOAD.salt), iterations: ENCRYPTED_PAYLOAD.iterations, hash: 'SHA-256' },
      baseKey,
      { name: 'AES-GCM', length: 256 },
      false,
      ['decrypt']
    );
  }

  async function decryptHtml(password) {
    if (!window.crypto || !crypto.subtle) {
      throw new Error('This browser does not support the Web Crypto API required to unlock this file.');
    }
    const key = await deriveKey(password);
    const decryptedBuffer = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv: base64ToBytes(ENCRYPTED_PAYLOAD.iv) },
      key,
      base64ToBytes(ENCRYPTED_PAYLOAD.ciphertext)
    );
    return new TextDecoder().decode(decryptedBuffer);
  }

  async function unlock(password, shouldRemember) {
    unlockButton.disabled = true;
    passwordInput.disabled = true;
    setStatus('Unlocking…');
    try {
      const html = await decryptHtml(password);
      if (shouldRemember) {
        localStorage.setItem(STORAGE_KEY, password);
      } else {
        localStorage.removeItem(STORAGE_KEY);
      }
      setStatus('Unlocked.', 'ok');
      document.open();
      document.write(html);
      document.close();
    } catch (error) {
      localStorage.removeItem(STORAGE_KEY);
      savedActions.hidden = true;
      setStatus(error && error.message && !/decrypt/i.test(error.message) ? error.message : 'Incorrect password. Please try again.', 'error');
      unlockButton.disabled = false;
      passwordInput.disabled = false;
      passwordInput.focus();
      passwordInput.select();
    }
  }

  function forgetSavedPassword() {
    localStorage.removeItem(STORAGE_KEY);
    rememberInput.checked = false;
    savedActions.hidden = true;
    passwordInput.value = '';
    setStatus('Saved password removed from this browser.', 'ok');
    passwordInput.focus();
  }

  form.addEventListener('submit', (event) => {
    event.preventDefault();
    unlock(passwordInput.value, rememberInput.checked);
  });

  forgetButton.addEventListener('click', forgetSavedPassword);

  const savedPassword = localStorage.getItem(STORAGE_KEY);
  if (savedPassword) {
    savedActions.hidden = false;
    rememberInput.checked = true;
    passwordInput.value = savedPassword;
    unlock(savedPassword, true);
  } else {
    passwordInput.focus();
  }
})();
</script>
